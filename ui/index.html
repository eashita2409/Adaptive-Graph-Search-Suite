<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Advanced Map Traversal Platform</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>
<body>
  <div class="app-container">
    <aside class="sidebar glass-panel">
      <div class="logo-container">
        <h1 style="white-space: nowrap; font-size: 19px;">Adaptive Graph Search Suite</h1>
        <p class="subtitle">High-Performance C++ Mapping Engine</p>
      </div>

      <div class="control-group">
        <label>Map Network</label>
        <select id="mapSelect">
          <!-- Populated dynamically via /maps API -->
        </select>
        <div class="coordinates-input">
          <div>
            <label>Source Node</label>
            <input id="source" type="number" min="0" value="0" />
          </div>
          <div>
            <label>Target Node</label>
            <input id="target" type="number" min="0" value="10" />
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>Search Algorithm</label>
        <select id="alg">
          <option value="bfs">Breadth-First Search (BFS)</option>
          <option value="dfs">Depth-First Search (DFS)</option>
          <option value="dijkstra">Dijkstra's Algorithm</option>
          <option value="astar">A* Heuristic Search</option>
          <option value="greedy">Greedy Best-First Search</option>
          <option value="bellmanford">Bellman-Ford Algorithm</option>
          <option value="floydwarshall">Floyd-Warshall Algorithm</option>
        </select>
      </div>

      <div class="control-group">
        <button id="runBackend" class="btn-primary">Execute C++ Engine</button>
      </div>

      <div class="control-group playback-controls">
        <label>Visualizer Playback</label>
        <div class="btn-group">
          <button id="play" class="btn-icon">▶ Play</button>
          <button id="pause" class="btn-icon">⏸ Pause</button>
          <button id="step" class="btn-icon">⏭ Step</button>
        </div>
        <div class="speed-control">
          <span>Speed: <span id="speedVal">50</span>ms</span>
          <input id="speed" type="range" min="10" max="1000" value="50" />
        </div>
      </div>

      <div class="logbox">
        <h4>Engine Status</h4>
        <pre id="log" class="custom-scrollbar">System Ready.</pre>
      </div>
    </aside>

    <main class="main-content">
      <div class="canvas-container glass-panel">
        <canvas id="cv" width="1200" height="800"></canvas>
      </div>

      <div class="metrics-bar">
        <div class="metric-card glass-panel">
          <span class="metric-label">Algorithm</span>
          <strong id="m-alg">--</strong>
        </div>
        <div class="metric-card glass-panel">
          <span class="metric-label">Time Complexity</span>
          <strong id="m-time-c">--</strong>
        </div>
        <div class="metric-card glass-panel">
          <span class="metric-label">Space Complexity</span>
          <strong id="m-space-c">--</strong>
        </div>
        <div class="metric-card glass-panel">
          <span class="metric-label">Engine Exec. Time</span>
          <strong id="m-exec-time">--</strong>
        </div>
      </div>
    </main>
  </div>

  <script src="visualizer.js"></script>
</body>
</html>
